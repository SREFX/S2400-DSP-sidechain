name: Sync Submodules
on:
  workflow_dispatch: # We only need this to run when you click the button

permissions:
  contents: write

jobs:
  build-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force Add Submodules
        run: |
          # 1. Set up the bot account
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Force Git to create the actual folder pointers
          git submodule add --force https://github.com/SREFX/S2400-sidechain.git S2400-sidechain
          git submodule add --force https://github.com/SREFX/S2400-sidechain-recv.git S2400-sidechain-recv
          
          # 3. Save and push
          git commit -m "Initialize submodules directly" || echo "No changes to commit"
          git push
